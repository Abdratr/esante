security:

    password_hashers:
        App\Entity\Admin:
            algorithm: auto

    providers:
        admin_provider:
            entity:
                class: App\Entity\Admin
                property: email

    firewalls:

        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true

            provider: admin_provider

            custom_authenticators:
                - App\Security\AdminAuthenticator

            logout:
                path: admin_logout

    access_control:
        - { path: ^/admin/dashboard, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            App\Entity\Admin:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10